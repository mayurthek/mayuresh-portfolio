<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mayur marathe</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        light: {
                            bg: '#FAF9F6', // Off-white/cream
                            text: '#222222', // Deep charcoal
                        },
                        dark: {
                            bg: '#121212', // Deep charcoal/near-black
                            text: '#F5F5F5', // Off-white
                        }
                    },
                    fontFamily: {
                        'caslon': ['"Caslon Antique"', 'serif'],
                        'sans': ['Inter', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Caslon Antique';
            src: url('https://fonts.cdnfonts.com/s/17215/CaslonAntique.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body {
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .dark body {
            background-color: #121212;
            color: #F5F5F5;
        }

        body {
            background-color: #FAF9F6;
            color: #222222;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col font-sans antialiased selection:bg-gray-300 dark:selection:bg-gray-700">

    <!-- Header / Nav -->
    <header class="p-6 md:p-8 flex justify-end items-center w-full">
        <button id="theme-toggle"
            class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors focus:outline-none"
            aria-label="Toggle Dark Mode">
            <!-- Sun Icon (shown in dark mode) -->
            <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 opacity-70" fill="currentColor" viewBox="0 0 20 20"
                xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                    fill-rule="evenodd" clip-rule="evenodd"></path>
            </svg>
            <!-- Moon Icon (shown in light mode) -->
            <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 opacity-70" fill="currentColor" viewBox="0 0 20 20"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-6">
        <div class="text-center">
            <h1 class="font-caslon text-5xl md:text-7xl lg:text-8xl tracking-tight mb-6">Mayur Marathe</h1>
            <p class="font-sans font-light text-lg md:text-xl lg:text-2xl opacity-80 tracking-wide">building products
                that people love / figuring out the next big thing.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-6 md:p-8 text-center opacity-50 font-sans text-sm tracking-widest lowercase">
        on a quest > wip
    </footer>

    <!-- Theme Toggle Script -->
    <script>
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        // Change the icons inside the button based on previous settings
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            themeToggleDarkIcon.classList.remove('hidden');
        }

        const themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function () {
            // toggle icons inside button
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            // if set via local storage previously
            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
                // if NOT set via local storage previously
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>

</html>
